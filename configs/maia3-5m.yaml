# Maia3 5m — full training config (architecture + data + recipe).
#
# Self-contained: the model size is chosen here, not on the CLI. Run with:
#
#   maia3-train --config configs/maia3-5m.yaml --parquet-path data/train.parquet
#
# CLI flags override anything here, e.g. --num-steps 300000.

model:
  # Architecture (~5M params). dim_emb / num_blocks / mlp_ratio and the GAB/norm
  # flags are shared across all sizes (and match the ModelConfig defaults); the
  # width-related fields below are what distinguish the size.
  dim_vit: 256
  num_heads: 8
  head_hid_dim: 256
  gab_gen_size: 64
  gab_per_square_dim: 0
  gab_intermediate_dim: 64

  history: 7

data:
  # Sharded training corpus: training operates one shard at a time,
  # but shard order is randomized each epoch (one full pass of all shards).
  parquet_paths:
    - data/lichess_parquet/train_2023-01.parquet
    - data/lichess_parquet/train_2023-02.parquet
    - data/lichess_parquet/train_2023-03.parquet
    - data/lichess_parquet/train_2023-04.parquet
    - data/lichess_parquet/train_2023-05.parquet
    - data/lichess_parquet/train_2023-06.parquet
    - data/lichess_parquet/train_2023-07.parquet
    - data/lichess_parquet/train_2023-08.parquet
    - data/lichess_parquet/train_2023-09.parquet
    - data/lichess_parquet/train_2023-10.parquet
    - data/lichess_parquet/train_2023-11.parquet
    - data/lichess_parquet/train_2023-12.parquet
    - data/lichess_parquet/train_2024-01.parquet
    - data/lichess_parquet/train_2024-02.parquet
    - data/lichess_parquet/train_2024-03.parquet
    - data/lichess_parquet/train_2024-04.parquet
    - data/lichess_parquet/train_2024-05.parquet
    - data/lichess_parquet/train_2024-06.parquet
    - data/lichess_parquet/train_2024-07.parquet
    - data/lichess_parquet/train_2024-08.parquet
    - data/lichess_parquet/train_2024-09.parquet
    - data/lichess_parquet/train_2024-10.parquet
    - data/lichess_parquet/train_2024-11.parquet
    - data/lichess_parquet/train_2024-12.parquet
    - data/lichess_parquet/train_2025-01.parquet
    - data/lichess_parquet/train_2025-02.parquet
    - data/lichess_parquet/train_2025-03.parquet
    - data/lichess_parquet/train_2025-04.parquet
    - data/lichess_parquet/train_2025-05.parquet
    - data/lichess_parquet/train_2025-06.parquet
    - data/lichess_parquet/train_2025-07.parquet
  # Validation is a held-out month (the one after the training range), built by
  # data/download_and_rename_datasets.sh alongside the training shards.
  val_parquet_path: data/lichess_parquet/val_2025-08.parquet
  batch_size: 2048
  val_batch_size: 2048
  num_workers: 8

train:
  output_dir: runs/maia3-5m

  # Optimizer
  lr: 5.0e-5
  min_lr: 1.0e-5
  weight_decay: 1.0e-6
  grad_clip: 3.5
  grad_accum_steps: 8                      # effective batch = batch_size * grad_accum_steps

  # Schedule: 1k linear warmup, then cosine warm restarts every 50k steps.
  warmup_steps: 1000
  cosine_cycle_steps: 50000
  num_steps: 1000000                       # 20 warm-restart cycles (20 * 50000)

  # Mixed precision (GradScaler)
  use_amp: true
  amp_growth_factor: 1.5
  amp_growth_interval: 2000
  amp_backoff_factor: 0.5

  # Loss scales
  policy_loss_weight: 1.0
  value_loss_weight: 0.1

  # Logging & validation
  log_interval: 50
  ckpt_interval: 5000
  val_interval: 1000
  # val_steps: 0 runs the full val set each pass.
  val_steps: 0

  # Keep the past 5 checkpoints and the best checkpoint.
  # See train.py `compute_loss` for metric names.
  keep_last_k: 5
  best_metric: acc/policy_top1
  best_mode: min

  # W&B logging
  use_wandb: true
  wandb_project: maia3
  wandb_entity: null                       # null = your default W&B entity
  wandb_run_name: null                     # null = W&B auto-generates a name
  wandb_mode: online
